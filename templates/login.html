<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="/static/pps-global.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Pure Way Profile</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #0a0a0a;
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-wrap {
    text-align: center;
    max-width: 420px;
    width: 90%;
  }
  .logo-bar {
    margin-bottom: 40px;
  }
  .logo-bar .brand {
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #B8922A;
    margin-bottom: 12px;
  }
  .logo-bar h1 {
    font-size: 32px;
    font-weight: 700;
    color: #fff;
    line-height: 1.2;
  }
  .logo-bar h1 span { color: #B8922A; }
  .logo-bar p {
    margin-top: 12px;
    color: #888;
    font-size: 15px;
    line-height: 1.6;
  }
  .card {
    background: #141414;
    border: 1px solid #222;
    border-radius: 12px;
    padding: 40px 36px;
  }
  .card label {
    display: block;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 10px;
    text-align: left;
  }
  .card input[type="password"] {
    width: 100%;
    background: #0a0a0a;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 14px 16px;
    color: #fff;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  .card input[type="password"]:focus { border-color: #B8922A; }
  .card button {
    margin-top: 20px;
    width: 100%;
    background: #B8922A;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 15px;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .card button:hover { background: #a07820; }
  .error {
    margin-top: 16px;
    color: #e05555;
    font-size: 14px;
  }
  .footer-note {
    margin-top: 28px;
    color: #444;
    font-size: 12px;
  }
</style>
</head>
<body>
<div class="login-wrap">
  <div style="text-align:center;padding:20px 0 0;">
  <img src="/static/logo.png" alt="Pure Property Solutions" onclick="window.location.href='https://hub.purepropsolutions.com/dashboard'" style="height:48px;opacity:0.85;cursor:pointer;" title="Back to Hub">
</div>
<div class="logo-bar">
    <div class="brand">Pure Property Solutions</div>
    <h1>The Pure Way <span>Profile</span></h1>
    <p>A behavioral assessment built for the PPS team.</p>
  </div>
  <div class="card">
    <form method="POST">
      <label>Access Password</label>
      <input type="password" name="password" placeholder="Enter password" autofocus required>
      <button type="submit">Enter →</button>
      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}
    </form>
  </div>
  <div class="footer-note">Trust. Quality. Results.™</div>
</div>
  <div style="text-align:center;padding:24px 0;"><img src="/static/PPS_statement1_MED.jpg" alt="The Pure Way: Trust. Quality. Results.™" style="height:20px;opacity:0.3;filter:invert(1);"></div>
</body>
</html>
